name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # lightweight deps only; NeMo/torch reserved for GPU integration runs
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn websockets python-multipart pydantic numpy soundfile prometheus_client pytest pytest-asyncio httpx

      - name: Run unit tests
        env:
          PYTHONPATH: src
        run: pytest tests/ -v --ignore=tests/integration
